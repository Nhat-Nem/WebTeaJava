<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tea & Cake Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold text-success fs-3" th:href="@{/}">
            TeaShop
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/}">Trang chủ</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Sản phẩm</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/combo}">Combo</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contact}">Liên hệ</a>
                </li>

            </ul>

            <div>

                <a href="/login" class="btn btn-outline-success me-2">
                    Đăng nhập
                </a>

                <a href="/cart" class="btn btn-success">
                    <i class="bi bi-cart"></i>
                </a>

            </div>

        </div>

    </div>
</nav>

<!-- Banner -->

<section class="bg-success text-white py-5">

    <div class="container">

        <div class="row align-items-center">

            <div class="col-md-6">

                <h1 class="display-4 fw-bold">
                    Fresh Tea & Bakery
                </h1>

                <p class="lead">
                    Trà thơm - Bánh ngon - Giao tận nơi
                </p>

                <a href="/products" class="btn btn-light btn-lg">
                    Mua ngay
                </a>

            </div>

            <div class="col-md-6 text-center">

                <img src="/images/banner.png"
                     class="img-fluid"
                     style="max-height:350px">

            </div>

        </div>

    </div>

</section>

<!-- Danh mục -->

<section class="container py-5">

    <h2 class="text-center mb-4">
        Danh mục
    </h2>

    <div class="row text-center">

        <div class="col-md-3">

            <div class="card shadow-sm p-4">

                <i class="bi bi-cup-hot fs-1 text-success"></i>

                <h5 class="mt-3">Trà</h5>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow-sm p-4">

                <i class="bi bi-cup-straw fs-1 text-success"></i>

                <h5 class="mt-3">Trà sữa</h5>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow-sm p-4">

                <i class="bi bi-cake2 fs-1 text-success"></i>

                <h5 class="mt-3">Bánh</h5>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow-sm p-4">

                <i class="bi bi-gift fs-1 text-success"></i>

                <h5 class="mt-3">Combo</h5>

            </div>

        </div>

    </div>

</section>

<!-- Sản phẩm -->

<section class="container pb-5">

    <h2 class="text-center mb-4">
        Sản phẩm nổi bật
    </h2>

    <div class="row">

        <div class="col-lg-3 col-md-6 mb-4">

            <div class="card shadow-sm">

                <img src="/images/product.jpg"
                     class="card-img-top">

                <div class="card-body">

                    <h5>Trà Đào Cam Sả</h5>

                    <h4 class="text-danger">
                        45.000đ
                    </h4>

                    <button class="btn btn-success w-100">
                        Thêm vào giỏ
                    </button>

                </div>

            </div>

        </div>

        <!-- Sau này dùng th:each để lặp sản phẩm -->

    </div>

</section>

<!-- Footer -->

<footer class="bg-dark text-white py-4">

    <div class="container text-center">

        <h5>Tea & Cake Shop</h5>

        <p>
            Địa chỉ: TP.HCM
        </p>

        <p>
            Hotline: 0123456789
        </p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
